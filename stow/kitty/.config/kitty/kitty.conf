# kitty.conf
# Place at: ~/.config/kitty/kitty.conf

# ---------- Font ----------
font_family      Agave
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ---------- Cursor ----------
cursor_shape     beam
cursor_blink_interval 0

# ---------- Window ----------
window_padding_width 10
confirm_os_window_close 0

# ---------- Scrollback ----------
scrollback_lines 10000

# ---------- Bell ----------
enable_audio_bell no

# ---------- Colors: Tokyo Night ----------
background            #1a1b26
foreground            #c0caf5
selection_background   #33467c
selection_foreground   #c0caf5
cursor                 #c0caf5
cursor_text_color      #1a1b26
url_color              #73daca

# black
color0  #15161e
color8  #414868

# red
color1  #f7768e
color9  #f7768e

# green
color2  #9ece6a
color10 #9ece6a

# yellow
color3  #e0af68
color11 #e0af68

# blue
color4  #7aa2f7
color12 #7aa2f7

# magenta
color5  #bb9af7
color13 #bb9af7

# cyan
color6  #7dcfff
color14 #7dcfff

# white
color7  #a9b1d6
color15 #c0caf5

# ---------- Tab bar ----------
tab_bar_style        powerline
tab_powerline_style   slanted
active_tab_background   #7aa2f7
active_tab_foreground   #1a1b26
inactive_tab_background #414868
inactive_tab_foreground #a9b1d6
