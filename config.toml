# config.example.toml - Template configuration file for sentry/dotfiles
# Copy this to config.toml and configure your keys and paths.

[gemini]
# API keys are now loaded from ~/Documents/api_keys.toml for security and key rolling.
enabled = true

# Per-repository override for Gemini-generated commit messages.
# Key is the absolute path to the repository, value is a boolean (true to enable, false to disable).
[gemini.repos]
# "/home/skc/dev/secret-project" = false

[github]
# Username and token are loaded from ~/Documents/api_keys.toml for security.

[paths]
# Directory where new code repositories are created/watched
dev_dir = "~/dev"
# Directory where AppImages are stored
applications_dir = "~/Applications"
# Directory of this dotfiles repository
dotfiles_dir = "/home/skc/dev/dotfiles"

[backup]
# Trigger schedule: "daily" or "weekly"
schedule = "daily"
# Time of backup trigger (24-hour format)
time = "03:00"
# Destination directory for heavy folder sync (e.g. an external drive)
heavy_dest = "/run/media/skc/BackupDrive/heavy_backup"
# Folders too heavy for git to be rsynced to heavy_dest
heavy_folders = [
    "~/.config/BraveSoftware",
    "~/.mozilla"
]
# RSync exclude patterns
rsync_exclude = [
    "**/Cache**",
    "**/Crash Reports**",
    "**/.git**"
]

[appimage]
# Mode for new AppImages: "log_only" (just log path) or "backup_copy" (copy to dotfiles/AppImages)
mode = "log_only"

# List of folders to watch with inotify-simple (relative to ~ is supported)
[watch]
paths = [
    "~/.config",
    "~/.local/bin",
    "~/Applications",
    "~/.local/share/fonts",
    "/etc/hosts"
]

# Mapping of source directories (relative to ~) to GNU Stow package names
# For example, when ~/.config/sway is backed up, it will be placed inside stow/sway/.config/sway
[stow.package_map]
".config/sway" = "sway"
".config/kitty" = "kitty"
".config/mako" = "mako"
".config/waybar" = "waybar"
".local/share/fonts" = "fonts"
".config/Thunar" = "thunar"
